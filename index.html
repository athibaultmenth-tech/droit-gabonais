<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Droit Gabonais</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --vert:#006B3F;
  --or:#C8A951;
  --ivoire:#FAF8F2;
  --texte:#102A43;
  --gris:#6B7C93;
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--ivoire);
  color:var(--texte);
}

header{
  background:var(--vert);
  color:white;
  padding:20px;
}

header h1{
  margin:0;
  font-family:Merriweather, serif;
  font-weight:700;
}

nav{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px 20px;
  background:#0b3d2e;
}

nav button{
  background:none;
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:6px 10px;
  cursor:pointer;
  font-size:12px;
}

nav button:hover{
  background:rgba(255,255,255,0.1);
}

.hero{
  padding:60px 20px;
  text-align:center;
}

.hero h2{
  font-size:32px;
  font-family:Merriweather, serif;
}

.search{
  margin-top:20px;
}

.search input{
  width:60%;
  padding:12px;
  border:1px solid #ddd;
}

.search button{
  padding:12px;
  background:var(--vert);
  color:white;
  border:none;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border:1px solid #eee;
  cursor:pointer;
}

.card:hover{
  border-color:var(--or);
}

footer{
  background:#0b3d2e;
  color:white;
  padding:30px;
  margin-top:40px;
  text-align:center;
}
</style>
</head>

<body>

<header>
  <h1>Droit Gabonais</h1>
</header>

<nav>
  <button onclick="show('home')">Accueil</button>
  <button onclick="show('codes')">Codes</button>
  <button onclick="show('histoire')">Histoire constitutionnelle</button>
  <button onclick="show('ohada')">OHADA</button>
  <button onclick="show('sources')">Sources</button>
</nav>

<div id="app"></div>

<footer>
© 2026 - Droit Gabonais | Projet indépendant
</footer>

<script>

const data = {
  codes:[
    {t:"Constitution gabonaise",d:"Texte fondamental de la République"},
    {t:"Code civil",d:"Droit des personnes et des biens"},
    {t:"Code pénal",d:"Infractions et sanctions"},
    {t:"Code du travail",d:"Relations employeur-employé"}
  ]
};

function show(page){
  const app = document.getElementById("app");

  if(page==="home"){
    app.innerHTML=`
      <div class="hero">
        <h2>Tout le droit gabonais en un seul endroit</h2>
        <p>Constitution, codes, lois, OHADA et archives juridiques.</p>

        <div class="search">
          <input id="q" placeholder="Rechercher un texte...">
          <button onclick="search()">Rechercher</button>
        </div>
      </div>

      <div class="grid">
        ${data.codes.map(c=>`
          <div class="card">
            <h3>${c.t}</h3>
            <p>${c.d}</p>
          </div>
        `).join('')}
      </div>
    `;
  }

  if(page==="codes"){
    app.innerHTML=`
      <h2 style="padding:20px">Codes et lois</h2>
      <div class="grid">
        ${data.codes.map(c=>`
          <div class="card">
            <h3>${c.t}</h3>
            <p>${c.d}</p>
          </div>
        `).join('')}
      </div>
    `;
  }

  if(page==="histoire"){
    app.innerHTML=`
      <div style="padding:20px">
        <h2>Histoire constitutionnelle</h2>
        <p>1958 → 1960 → 1991 → 2003 → 2023</p>
      </div>
    `;
  }

  if(page==="ohada"){
    app.innerHTML=`
      <div style="padding:20px">
        <h2>OHADA</h2>
        <p>Droit des affaires harmonisé en Afrique francophone.</p>
      </div>
    `;
  }

  if(page==="sources"){
    app.innerHTML=`
      <div style="padding:20px">
        <h2>Sources</h2>
        <ul>
          <li>Journal officiel de la République gabonaise</li>
          <li>OHADA</li>
          <li>Archives nationales</li>
        </ul>
      </div>
    `;
  }
}

function search(){
  const q=document.getElementById("q").value;
  alert("Recherche : " + q + " (version à connecter à une base de données ensuite)");
}

show("home");

</script>

</body>
</html>
