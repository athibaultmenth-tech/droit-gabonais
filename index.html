<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
// ... (Copiez tout votre code JavaScript jusqu'à la ligne "publierServiceManuel() {") ...

    publierServiceManuel() {
        const nom = this.nouveauService.nom.trim();
        const desc = this.nouveauService.desc.trim();
        if (!nom || !desc) {
          alert("Informations manquantes.");
          return;
        }

        const service = {
          id: `svc_${Date.now()}`,
          nom,
          desc,
          prix: Number(this.nouveauService.prix) || 0
        };

        if (this.nouveauService.cible === 'citoyen') {
            this.svcCitoyens.push(service);
            this.persistCitoyens();
        } else {
            this.svcEntreprises.push(service);
            this.persistEntreprises();
        }
        
        this.nouveauService = { cible: "citoyen", nom: "", desc: "", prix: "" };
        alert("Service ajouté avec succès.");
      }
    }
  }).mount('#app');
});
</script>
</body>
</html>
